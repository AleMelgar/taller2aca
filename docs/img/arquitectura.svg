<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" font-family="Roboto, Arial, sans-serif">
  <rect width="760" height="320" fill="#f5f7fa" rx="12"/>
  <text x="380" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1565c0">Arquitectura del CRUD de Productos</text>

  <!-- Main -->
  <rect x="40" y="90" width="180" height="120" rx="10" fill="#1565c0"/>
  <text x="130" y="130" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">Main.java</text>
  <text x="130" y="158" text-anchor="middle" font-size="13" fill="#bbdefb">Menú por consola</text>
  <text x="130" y="178" text-anchor="middle" font-size="13" fill="#bbdefb">Lee opciones (1-4, 0)</text>

  <!-- Gestor -->
  <rect x="290" y="90" width="180" height="120" rx="10" fill="#00897b"/>
  <text x="380" y="125" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">GestorProductos</text>
  <text x="380" y="150" text-anchor="middle" font-size="12" fill="#b2dfdb">agregar()</text>
  <text x="380" y="168" text-anchor="middle" font-size="12" fill="#b2dfdb">listar()</text>
  <text x="380" y="186" text-anchor="middle" font-size="12" fill="#b2dfdb">actualizar() / eliminar()</text>

  <!-- Producto -->
  <rect x="540" y="90" width="180" height="120" rx="10" fill="#6a1b9a"/>
  <text x="630" y="125" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">Producto.java</text>
  <text x="630" y="152" text-anchor="middle" font-size="12" fill="#e1bee7">id : int</text>
  <text x="630" y="170" text-anchor="middle" font-size="12" fill="#e1bee7">nombre : String</text>
  <text x="630" y="188" text-anchor="middle" font-size="12" fill="#e1bee7">precio : double</text>

  <!-- Arrows -->
  <line x1="220" y1="150" x2="290" y2="150" stroke="#455a64" stroke-width="3" marker-end="url(#a)"/>
  <line x1="470" y1="150" x2="540" y2="150" stroke="#455a64" stroke-width="3" marker-end="url(#a)"/>

  <text x="255" y="140" text-anchor="middle" font-size="11" fill="#455a64">usa</text>
  <text x="505" y="140" text-anchor="middle" font-size="11" fill="#455a64">crea</text>

  <text x="380" y="270" text-anchor="middle" font-size="13" fill="#607d8b">Java 17+ · Aplicación de consola · Sin frameworks externos</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#455a64"/>
    </marker>
  </defs>
</svg>
